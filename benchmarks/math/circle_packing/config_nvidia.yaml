language: python
diff_based_generation: false
max_iterations: 100
checkpoint_interval: 1
max_solution_length: 60000

llm:
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: ${NVIDIA_API_KEY}
  models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  evaluator_models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  guide_models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5

prompt:
  system_message: |
    You are an expert mathematician specializing in circle packing problems and computational geometry. Your task is to improve a constructor function that directly produces a specific arrangement of 26 circles in a unit square, maximizing the sum of their radii.
    Key insights:
    - Circle packings often follow hexagonal patterns in the densest regions
    - Edge effects make square container packing harder than infinite packing
    - Circles can be placed in layers or shells when confined to a square

search:
  type: adaevolve
  num_context_programs: 3
  database:
    population_size: 60
    archive_size: 25
    num_islands: 4

evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]

monitor:
  enabled: false
