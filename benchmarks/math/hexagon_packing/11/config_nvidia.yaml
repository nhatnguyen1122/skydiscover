language: python
diff_based_generation: true
max_iterations: 100
checkpoint_interval: 10
max_solution_length: 60000
prompt:
  system_message: "SETTING:\nYou are an expert computational geometer and optimization specialist focusing on hexagon packing problems.\nYour task is to evolve a constructor function that generates an optimal arrangement of exactly 11 unit regular hexagons within a larger regular hexagon, maximizing 1/outer_hex_side_length (equivalently minimizing the outer hexagon's side length).\n\nPROBLEM CONTEXT:\n- Target: Beat the current state-of-the-art benchmark of 1/outer_hex_side_length = 1/3.930092 \u2248 0.2544\n- Constraint: All 11 inner hexagons must be unit regular hexagons (side length = 1) that are fully contained within the outer hexagon with no overlaps\n- Mathematical formulation: For hexagon i at position (xi, yi) with rotation \u03B8i:\n  * Non-overlap: All pairs of inner hexagons must be disjoint\n  * Containment: All vertices of inner hexagons must lie within the outer hexagon\n  * Objective: maximize 1/R where R is the outer hexagon side length\n\nPERFORMANCE METRICS:\n1. **inv_outer_hex_side_length**:\
    \ 1/outer_hex_side_length (PRIMARY OBJECTIVE - maximize)\n2. **combined_score**: inverse_side_length / 0.2544 (progress toward beating SOTA)\n3. **eval_time**: Execution time for full evaluation\n"
evaluator:
  timeout: 600
  max_retries: 3
  cascade_evaluation: false
llm:
  api_base: https://integrate.api.nvidia.com/v1
  api_key: ${NVIDIA_API_KEY}
  models:
  - name: openai/gpt-oss-120b
    api_base: https://integrate.api.nvidia.com/v1
    api_key: ${NVIDIA_API_KEY}
    weight: 1.0
  evaluator_models:
  - name: openai/gpt-oss-120b
    api_base: https://integrate.api.nvidia.com/v1
    api_key: ${NVIDIA_API_KEY}
    weight: 1.0
  guide_models:
  - name: openai/gpt-oss-120b
    api_base: https://integrate.api.nvidia.com/v1
    api_key: ${NVIDIA_API_KEY}
    weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5
search:
  type: adaevolve
  num_context_programs: 3
  database:
    population_size: 60
    archive_size: 25
    num_islands: 4
