language: python
diff_based_generation: true
max_iterations: 50
checkpoint_interval: 1
max_solution_length: 60000

llm:
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: ${NVIDIA_API_KEY}
  models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  evaluator_models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  guide_models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5

prompt:
  system_message: "You are an expert signal processing engineer specializing in real-time adaptive filtering algorithms. Your task is to improve a signal processing algorithm that filters volatile, non-stationary time series data using a sliding window approach. Focus on multi-objective optimization of: slope change minimization, lag error minimization, tracking accuracy, and false reversal penalty."

search:
  type: adaevolve
  num_context_programs: 3
  database:
    population_size: 80
    archive_size: 30
    num_islands: 4

evaluator:
  timeout: 120
  cascade_evaluation: true
  cascade_thresholds: [0.3, 0.6]

monitor:
  enabled: false
