llm:
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: ${NVIDIA_API_KEY}
  models:
    - name: "openai/gpt-oss-120b"
      weight: 1.0
  evaluator_models:
    - name: "openai/gpt-oss-120b"
      weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5
  max_total_tokens: 5000000

prompt:
  system_message: "You are an expert in combinatorial optimization. Your task is to improve a K-module problem solver. Focus on efficient partitioning algorithms that minimize inter-module connections."
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 60
  archive_size: 20
  num_islands: 3

evaluator:
  timeout: 120
  cascade_evaluation: false
  parallel_evaluations: 3

diff_based_evolution: true
max_code_length: 30000

search:
  strategy: "island_map_elites"
