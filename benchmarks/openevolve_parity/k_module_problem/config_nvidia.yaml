language: python
diff_based_generation: true
max_iterations: 50
checkpoint_interval: 1
max_solution_length: 30000

llm:
  api_base: "https://integrate.api.nvidia.com/v1"
  api_key: ${NVIDIA_API_KEY}
  models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  evaluator_models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  guide_models:
    - name: "openai/gpt-oss-120b"
      api_base: "https://integrate.api.nvidia.com/v1"
      api_key: ${NVIDIA_API_KEY}
      weight: 1.0
  temperature: 0.2
  max_tokens: 4096
  timeout: 600
  retries: 3
  retry_delay: 5

prompt:
  system_message: "You are an expert in combinatorial optimization. Your task is to improve a K-module problem solver. Focus on efficient search over independent module choices and preserve valid pipeline configurations."

search:
  type: adaevolve
  num_context_programs: 3
  database:
    population_size: 60
    archive_size: 20
    num_islands: 3

evaluator:
  timeout: 120
  cascade_evaluation: false

monitor:
  enabled: false
